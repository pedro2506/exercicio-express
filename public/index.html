<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mb-4">
            <h2 class="text-center mb-4">Cadastro de Produtos</h2>
            <form id="form-produto" class="row g-3">
                <input type="hidden" id="produto-id">
                <div class="col-md-6">
                    <input type="text" id="nome" class="form-control" placeholder="Nome do produto" required>
                </div>
                <div class="col-md-4">
                    <input type="number" id="preco" step="0.01" class="form-control" placeholder="Preço (ex: 20.50)" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100" id="btn-salvar">Adicionar</button>
                </div>
            </form>
        </div>

        <div class="card shadow p-4">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-produtos"></tbody>
            </table>
        </div>
    </div>

    <script>
        const form = document.getElementById('form-produto');
        const tabela = document.getElementById('tabela-produtos');
        const inputId = document.getElementById('produto-id');
        const inputNome = document.getElementById('nome');
        const inputPreco = document.getElementById('preco');
        const btnSalvar = document.getElementById('btn-salvar');

        // Carregar produtos
        async function carregarProdutos() {
            const res = await fetch('/produtos');
            const produtos = await res.json();
            tabela.innerHTML = '';
            produtos.forEach(p => {
                tabela.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nome}</td>
                        <td>R$ ${Number(p.preco).toFixed(2)}</td>
                        <td class="text-center">
                            <button class="btn btn-warning btn-sm me-2" onclick="prepararEdicao(${p.id}, '${p.nome}', ${p.preco})">Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="deletarProduto(${p.id})">Excluir</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Salvar (Adicionar ou Editar)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = inputId.value;
            const dados = { nome: inputNome.value, preco: Number(inputPreco.value) };

            const url = id ? `/produtos/${id}` : '/produtos';
            const method = id ? 'PUT' : 'POST';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            form.reset();
            inputId.value = '';
            btnSalvar.textContent = 'Adicionar';
            carregarProdutos();
        });

        // Deletar
        async function deletarProduto(id) {
            if (confirm("Excluir produto?")) {
                await fetch(`/produtos/${id}`, { method: 'DELETE' });
                carregarProdutos();
            }
        }

        // Preparar edição
        function prepararEdicao(id, nome, preco) {
            inputId.value = id;
            inputNome.value = nome;
            inputPreco.value = preco;
            btnSalvar.textContent = 'Atualizar';
        }

        carregarProdutos();
    </script>
</body>
</html>
