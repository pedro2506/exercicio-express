<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Pro + Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f0f2f5; }
        .badge-categoria { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow-sm p-4 mb-4 border-0">
            <h2 class="text-center mb-4 text-primary">📦 Estoque Inteligente</h2>
            <form id="form-produto" class="row g-3">
                <input type="hidden" id="produto-id">
                <div class="col-md-5">
                    <label class="form-label fw-bold">Nome</label>
                    <input type="text" id="nome" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Categoria</label>
                    <select id="categoria" class="form-select" required>
                        <option value="Eletrônicos">Eletrônicos</option>
                        <option value="Alimentos">Alimentos</option>
                        <option value="Vestuário">Vestuário</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Preço</label>
                    <input type="number" id="preco" step="0.01" class="form-control" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100" id="btn-salvar">Salvar</button>
                </div>
            </form>
        </div>

        <div class="card shadow-sm p-4 border-0">
            <div class="d-flex justify-content-between mb-3">
                <input type="text" id="input-busca" class="form-control w-75" placeholder="🔍 Buscar por nome ou categoria...">
            </div>
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-produtos"></tbody>
            </table>
        </div>
    </div>

    <script>
        const form = document.getElementById('form-produto');
        const tabela = document.getElementById('tabela-produtos');
        const inputBusca = document.getElementById('input-busca');
        let todosProdutos = [];

        async function carregarProdutos() {
            const res = await fetch('/produtos');
            todosProdutos = await res.json();
            renderizar(todosProdutos);
        }

        function renderizar(lista) {
            tabela.innerHTML = '';
            lista.forEach(p => {
                tabela.innerHTML += `
                    <tr>
                        <td>#${p.id}</td>
                        <td class="fw-bold">${p.nome}</td>
                        <td><span class="badge bg-info text-dark badge-categoria">${p.categoria}</span></td>
                        <td class="text-success fw-bold">R$ ${Number(p.preco).toFixed(2)}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-warning me-1" onclick="prepararEdicao(${p.id}, '${p.nome}', ${p.preco}, '${p.categoria}')">✏️</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="excluir(${p.id})">🗑️</button>
                        </td>
                    </tr>`;
            });
        }

        // Busca Inteligente (Nome ou Categoria)
        inputBusca.addEventListener('input', (e) => {
            const t = e.target.value.toLowerCase();
            const f = todosProdutos.filter(p => p.nome.toLowerCase().includes(t) || p.categoria.toLowerCase().includes(t));
            renderizar(f);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('produto-id').value;
            const dados = {
                nome: document.getElementById('nome').value,
                preco: Number(document.getElementById('preco').value),
                categoria: document.getElementById('categoria').value
            };

            await fetch(id ? `/produtos/${id}` : '/produtos', {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            form.reset();
            document.getElementById('produto-id').value = '';
            carregarProdutos();
            Swal.fire('Sucesso!', 'Produto atualizado.', 'success');
        });

        function prepararEdicao(id, nome, preco, categoria) {
            document.getElementById('produto-id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('preco').value = preco;
            document.getElementById('categoria').value = categoria;
            document.getElementById('btn-salvar').textContent = 'Atualizar';
            window.scrollTo(0, 0);
        }

        async function excluir(id) {
            const r = await Swal.fire({ title: 'Excluir?', showCancelButton: true });
            if (r.isConfirmed) {
                await fetch(`/produtos/${id}`, { method: 'DELETE' });
                carregarProdutos();
            }
        }

        carregarProdutos();
    </script>
</body>
</html>
