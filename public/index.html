<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mb-4">
            <h2 class="text-center mb-4">Cadastro de Produtos</h2>
            <form id="form-produto" class="row g-3">
                <input type="hidden" id="produto-id"> <div class="col-md-6">
                    <input type="text" id="nome" class="form-control" placeholder="Nome do produto" required>
                </div>
                <div class="col-md-4">
                    <input type="number" id="preco" step="0.01" class="form-control" placeholder="Preço (ex: 20.50)" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100" id="btn-salvar">Adicionar</button>
                </div>
            </form>
        </div>

        <div class="card shadow p-4">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-produtos">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
